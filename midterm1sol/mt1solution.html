<!DOCTYPE html>
<html>
<head>
  <title>mid term 1 Calculator</title>
</head>
<body>

  <h2>Calculator</h2>

  <label>Enter First Number - </label>
  <input type="number" id="no.1"><br><br>

  <label>Enter Second Number - </label>
  <input type="number" id="no.2"><br><br>

  <button onclick="calculate()">Calculate</button>

  <h3 id="final"></h3>

  <script>
    function calculate() {
      let n1 = Number(document.getElementById("no.1").value);
      let n2 = Number(document.getElementById("no.2").value);

      let sum = n1 + n2;
      let diff = n1 - n2;
      let product = n1 * n2;

      document.getElementById("final").innerHTML =
        "Sum: " + sum + "<br>" +
        "Difference: " + diff + "<br>" +
        "Product: " + product;
    }
  </script>

</body>
</html>
